<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Comparator Transparent de Orașe</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #1b60df, #29cddf);
            color: white;
            min-height: 100vh;
        }

        .card-oras {
            background: rgba(130, 228, 226, 0.36);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            min-height: 600px;
        }

        .card-oras img {
            border-radius: 15px;
            max-height: 200px;
            object-fit: cover;
            width: 100%;
        }

        .zona-castigator {
            background: rgba(0,255,150,0.2);
            padding: 20px;
            border-radius: 15px;
            margin-top: 30px;
            text-align: center;
        }

        .titlu-sectiune {
            border-bottom: 1px solid rgba(255,255,255,0.3);
            margin-top: 15px;
            margin-bottom: 10px;
            padding-bottom: 5px;
        }
    </style>
</head>
<body class="container py-5">

<h1 class="text-center mb-5"> Comparator de Orașe</h1>

<div class="row g-4">

    <!-- ORAȘ 1 -->
    <div class="col-md-6">
        <div class="card-oras">
            <input type="text" id="city1" class="form-control mb-3" placeholder="Introdu primul oraș">
            <div id="card1"></div>
        </div>
    </div>

    <!-- ORAȘ 2 -->
    <div class="col-md-6">
        <div class="card-oras">
            <input type="text" id="city2" class="form-control mb-3" placeholder="Introdu al doilea oraș">
            <div id="card2"></div>
        </div>
    </div>

</div>

<div class="text-center mt-4">
    <button class="btn btn-light btn-lg" onclick="comparaOrase()">Compară</button>
</div>

<div id="rezultatFinal" class="zona-castigator"></div>


<script>

function comparaOrase() {

    const oras1 = document.getElementById("city1").value.trim();
    const oras2 = document.getElementById("city2").value.trim();

    if(!oras1 || !oras2){
        alert("Introduceți ambele orașe.");
        return;
    }

    fetch("{% url 'compare' %}", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded",
            "X-CSRFToken": "{{ csrf_token }}"
        },
        body: `city1=${encodeURIComponent(oras1)}&city2=${encodeURIComponent(oras2)}`
    })
    .then(response => response.json())
    .then(data => {

        if(data.error){
            alert(data.error);
            return;
        }

        afiseazaDate("card1", data.oras1);
        afiseazaDate("card2", data.oras2);

        document.getElementById("rezultatFinal").innerHTML = `
            <h2>Oraș câștigător: ${data.rezultat.oras_castigator}</h2>
            <h2>Capitală câștigătoare: ${data.rezultat.capitala_castigatoare}</h2>
        `;
    });
}


function afiseazaDate(elementId, pachet){

    const oras = pachet.oras;
    const capitala = pachet.capitala;

    document.getElementById(elementId).innerHTML = `
        <h3 class="titlu-sectiune">${oras.meta.nume}</h3>
        <img src="${oras.meta.imagine || ''}" class="mb-3">

        <strong>DATE BRUTE:</strong>
        <p>Latitudine: ${oras.raw.lat}</p>
        <p>Longitudine: ${oras.raw.lon}</p>
        <p>Cod țară: ${oras.raw.cod_tara}</p>
        <p>Temperatură: ${oras.raw.temperatura} °C</p>
        <p>PM2.5: ${oras.raw.pm25}</p>
        <p>Populație: ${oras.raw.populatie.toLocaleString()}</p>
        <p>Monedă: ${oras.meta.moneda}</p>

        <strong>PROCESARE:</strong>
        <p>Scor Confort: ${oras.procesare.confort}</p>
        <p>Scor Aer: ${oras.procesare.aer}</p>
        <p>Scor Densitate: ${oras.procesare.densitate}</p>
        <p><strong>Scor Total: ${oras.procesare.total}</strong></p>

        <hr>

        <h4 class="titlu-sectiune">Capitală: ${capitala.raw.nume}</h4>
        <img src="${capitala.meta.imagine || ''}" class="mb-3">

        <strong>DATE BRUTE:</strong>
        <p>Temperatură: ${capitala.raw.temperatura} °C</p>
        <p>Populație: ${capitala.raw.populatie.toLocaleString()}</p>

        <strong>PROCESARE:</strong>
        <p>Scor Confort: ${capitala.procesare.confort}</p>
        <p>Scor Aer: ${capitala.procesare.aer}</p>
        <p>Scor Densitate: ${capitala.procesare.densitate}</p>
        <p><strong>Scor Total: ${capitala.procesare.total}</strong></p>
    `;
}

</script>

</body>
</html>
