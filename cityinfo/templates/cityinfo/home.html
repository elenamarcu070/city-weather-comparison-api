<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Transparent City Comparator</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            min-height: 100vh;
        }

        .city-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            min-height: 550px;
        }

        .city-card img {
            border-radius: 15px;
            max-height: 200px;
            object-fit: cover;
            width: 100%;
        }

        .winner-box {
            background: rgba(0,255,150,0.2);
            padding: 20px;
            border-radius: 15px;
            margin-top: 30px;
        }

        .section-title {
            border-bottom: 1px solid rgba(255,255,255,0.3);
            margin-top: 15px;
            margin-bottom: 10px;
            padding-bottom: 5px;
        }

        .small-label {
            font-size: 0.85rem;
            opacity: 0.8;
        }
    </style>
</head>
<body class="container py-5">

<h1 class="text-center mb-5">🌍 Transparent City Comparator</h1>

<div class="row g-4">

    <!-- CITY 1 -->
    <div class="col-md-6">
        <div class="city-card">
            <input type="text" id="city1" class="form-control mb-3" placeholder="Oraș 1">
            <div id="card1"></div>
        </div>
    </div>

    <!-- CITY 2 -->
    <div class="col-md-6">
        <div class="city-card">
            <input type="text" id="city2" class="form-control mb-3" placeholder="Oraș 2">
            <div id="card2"></div>
        </div>
    </div>

</div>

<div class="text-center mt-4">
    <button class="btn btn-light btn-lg" onclick="compareCities()">Compară</button>
</div>

<div id="finalResult" class="winner-box text-center mt-4"></div>


<script>
function compareCities() {

    const city1 = document.getElementById("city1").value.trim();
    const city2 = document.getElementById("city2").value.trim();

    if(!city1 || !city2){
        alert("Introduceți ambele orașe.");
        return;
    }

    fetch("{% url 'compare' %}", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded",
            "X-CSRFToken": "{{ csrf_token }}"
        },
        body: `city1=${encodeURIComponent(city1)}&city2=${encodeURIComponent(city2)}`
    })
    .then(response => response.json())
    .then(data => {

        if(data.error){
            alert(data.error);
            return;
        }

        renderBundle("card1", data.city1);
        renderBundle("card2", data.city2);

        document.getElementById("finalResult").innerHTML = `
            <h2>🏆 Oraș câștigător: ${data.comparison.city_winner}</h2>
            <h2>🏛 Capitală câștigătoare: ${data.comparison.capital_winner}</h2>
        `;
    })
    .catch(err => {
        console.error(err);
        alert("Eroare la procesare.");
    });
}


function renderBundle(elementId, bundle){

    const city = bundle.city;
    const capital = bundle.capital;

    document.getElementById(elementId).innerHTML = `
        <h3 class="section-title">🏙 ${city.meta.name}</h3>
        <img src="${city.meta.image || ''}" class="mb-3">

        <div class="small-label">📡 RAW DATA</div>
        <p>Lat: ${city.raw.lat}</p>
        <p>Lon: ${city.raw.lon}</p>
        <p>Country Code: ${city.raw.country_code}</p>
        <p>Temperatură: ${city.raw.temperature} °C</p>
        <p>PM2.5: ${city.raw.pm25}</p>
        <p>Populație: ${city.raw.population.toLocaleString()}</p>
        <p>Monedă: ${city.meta.currency}</p>

        <div class="small-label mt-2">🧠 PROCESARE</div>
        <p>Comfort Score = ${city.processed.comfort}</p>
        <p>Air Quality Score = ${city.processed.air_quality}</p>
        <p>Density Score = ${city.processed.density}</p>
        <p><strong>Total Score = ${city.processed.total}</strong></p>

        <hr>

        <h4 class="section-title">🏛 Capitală: ${capital.raw.name}</h4>
        <img src="${capital.meta.image || ''}" class="mb-3">

        <div class="small-label">📡 RAW DATA</div>
        <p>Temperatură: ${capital.raw.temperature} °C</p>
        <p>Populație: ${capital.raw.population.toLocaleString()}</p>

        <div class="small-label mt-2">🧠 PROCESARE</div>
        <p>Comfort Score = ${capital.processed.comfort}</p>
        <p>Air Quality Score = ${capital.processed.air_quality}</p>
        <p>Density Score = ${capital.processed.density}</p>
        <p><strong>Total Score = ${capital.processed.total}</strong></p>
    `;
}
</script>

</body>
</html>
